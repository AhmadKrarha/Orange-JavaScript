<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>basic form handling </title>
    <style>
        body{
            text-align: center;
        }
        input{
            margin-left: 20px;
            margin: 5px;
            padding: 5px;
            border-radius: 5px;
            border: 1px solid black;
            width: 200px;
        }
        button{
            padding: 5px;
            border-radius: 5px;
            border: 1px solid black;
            background-color: blue;
            color: white;
            width: 200px;
        }
        form
        {
            margin-top: 50px;
        }
        h1
        {
            margin-top: 100px;
        }
    

    </style>
</head>
<body>
    
    <h1>Basic form handling</h1>
    <form action="">
    <label for="firstName"> First Name  </label>
    <input type="text" id="firstName" name="firstName" placeholder="Enter your first name">
    <br><br>
    <label for="lastName"> Last Name </label>
    <input type="text" id="lastName" name="lastName" placeholder="Enter your last name">
    <br><br>
    <label style="margin-right: 25px;" for="email"> Email    </label>
    <input type="email" id="email" name="email" placeholder="Enter your email">
    <br><br>
    <button  > Submit</button>
        </form>
        <hr>
        <p>first Name :<span id="firstNameDiv"></span></p>
    
        <p>last Name:<span id="lastNameDiv"></span></p>
        <p>email:  <span id="emailDiv"></span></p>
        <script >
            document.querySelector("button").addEventListener("click",function(e){
                e.preventDefault();
                let firstName = document.querySelector("#firstName").value;
                let lastName = document.querySelector("#lastName").value;
                let email = document.querySelector("#email").value;
                document.querySelector("#firstNameDiv").innerHTML = firstName;
                document.querySelector("#lastNameDiv").innerHTML = lastName;
                document.querySelector("#emailDiv").innerHTML = email;
            })
        </script>
</body>
</html>
