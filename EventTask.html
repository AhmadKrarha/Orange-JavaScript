<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #toggleBtn {
            width: 200px;
            height: 100px;
            background-color: rgb(0, 255, 242);
        }

        .btn-active {
            background-color: rgb(255, 0, 0);
        }

        input {
            width: 200px;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #00bcd4;
            border-radius: 5px;
            outline: none;
        }

        input:focus {
            border-color: #ff5722;
        }

        #preview {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            min-height: 24px;
        }

        #addBtn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #00bcd4;
            color: white;
            border: none;
            border-radius: 5px;
        }

        #addBtn:hover {
            background-color: #0097a7;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 5px 0;
        }

        .delete-btn {
            padding: 4px 10px;
            background-color: #ff5722;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .delete-btn:hover {
            background-color: #e64a19;
        }

        .card {
            width: 250px;
            height: 100px;
            background-color: cyan;
            display: inline-block;
            margin: 10px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .active {
            background-color: red;
        }

        #content-section {
            margin-top: 20px;
            padding: 20px;
            background-color: #f0f4f8;
            border: 2px solid #007bff;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .hidden {
            display: none;
        }

        .controls button {
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            border: 1px solid #ccc;
            background: white;
        }
        .counter-container {
    text-align: center;
    background: white;
    padding: 2rem;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
}

#value {
    font-size: 6rem;
    font-weight: bold;
    display: block;
    margin: 20px 0;
    transition: color 0.3s ease;
}

.button-group {
    display: flex;
    gap: 10px;
}

.btn {
    padding: 10px 20px;
    border: 2px solid #222;
    background: transparent;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    text-transform: uppercase;
    transition: all 0.2s;
}

.btn:hover {
    background: #222;
    color: white;
}
    </style>
</head>

<body>

    <button id="toggleBtn">Click Me</button>

    <br><br>

    <input type="text" id="myInput" placeholder="Type something...">
    <button id="addBtn">Add Task</button>

    <p id="preview"></p>

    <ul id="taskList"></ul>
    <div class="cards">
        <div class="card"> card 1</div>
        <div class="card">card 2</div>
        <div class="card">card 3</div>
        <div class="card">card 4</div>
    </div>
    <div class="controls">
        <button id="btn-class">Toggle via classList</button>
        <button id="btn-style">Toggle via .style.display</button>
    </div>

    <section id="content-section">
        <h2>Sensitive Information 🕵️‍♂️</h2>
        <p>This section will appear and disappear depending on which button you click!</p>
    </section>

    <div class="counter-container">
    <h1>Counter</h1>
    <span id="value">0</span>
    <div class="button-group">
        <button class="btn decrease">Decrease</button>
        <button class="btn reset">Reset</button>
        <button class="btn increase">Increase</button>
    </div>
</div>

    <script>
        const toggleBtn = document.querySelector("#toggleBtn");

        toggleBtn.addEventListener("click", function () {
            toggleBtn.classList.toggle("btn-active");
            toggleBtn.textContent = toggleBtn.classList.contains("btn-active")
                ? "Clicked!"
                : "Click Me";
        });

        const input = document.querySelector("#myInput");
        const preview = document.querySelector("#preview");

        input.addEventListener("input", function (event) {
            preview.textContent = event.target.value;
        });

        const addBtn = document.querySelector("#addBtn");
        const taskList = document.querySelector("#taskList");

        addBtn.addEventListener("click", function () {
            const taskValue = input.value.trim();

            if (taskValue !== "") {
                const li = document.createElement("li");
                li.className = "task-item";
                li.innerHTML = `
                    <span>${taskValue}</span>
                    <button class="delete-btn">Delete</button>`;

                taskList.appendChild(li);
                input.value = "";
                preview.textContent = "";
                input.focus();
            }
        });
        taskList.addEventListener("click", function (event) {
            if (event.target.classList.contains("delete-btn")) {
                event.target.parentElement.remove();
            }
        });


        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            card.addEventListener('click', function () {
                cards.forEach(c => c.classList.remove('active'));
                this.classList.add('active');

            });
        });

        const btnClass = document.querySelector('#btn-class');
        const btnStyle = document.querySelector('#btn-style');
        const contentSection = document.querySelector('#content-section');

        btnClass.addEventListener('click', function () {
            contentSection.classList.toggle('hidden');
        });

        btnStyle.addEventListener('click', function () {
            contentSection.style.display = contentSection.style.display === 'none' ? 'block' : 'none';
        });

        const decreaseBtn = document.querySelector('.decrease');
        const increaseBtn = document.querySelector('.increase');
        const resetBtn = document.querySelector('.reset');
        const value = document.querySelector('#value');

        let count = 0;

      // 1. Create a function to handle the "View" (what the user sees)
function updateDisplay() {
    value.textContent = count;

    // Change color based on count
    if (count > 0) {
        value.style.color = 'green';
    } else if (count < 0) {
        value.style.color = 'red';
    } else {
        value.style.color = 'black';
    }
}

// 2. Use that function inside your listeners
increaseBtn.addEventListener('click', function () {
    count++;
    updateDisplay(); // Call the helper!
});

decreaseBtn.addEventListener('click', function () {
    count--;
    updateDisplay();
});

resetBtn.addEventListener('click', function () {
    count = 0;
    updateDisplay();
});


    </script>
</body>

</html>
